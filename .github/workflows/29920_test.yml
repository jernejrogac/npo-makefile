name: 29920 - Testiranje
on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  preveri_teste:
    name: Preveri testno datoteko
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Preveri ce obstaja test_main.py
        run: |
          if [ ! -f test_main.py ]; then
            echo "test_main.py ne obstaja" > napaka.txt
          else
            touch napaka.txt
          fi
      - name: Nalozi napaka.txt
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  pozeni_teste:
    name: Pozeni teste
    needs: preveri_teste
    strategy:
      matrix:
        python_version: ["3.10", "3.11"]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Namesti Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - name: Prenesi napaka.txt
        uses: actions/download-artifact@v4
        with:
          name: napaka
          path: ./artefakti
      - name: Preveri napaka.txt
        run: |
          if [ ! -f ./artefakti/napaka.txt ]; then
            echo "napaka.txt manjka"
            exit 1
          fi
          if [ -s ./artefakti/napaka.txt ]; then
            cat ./artefakti/napaka.txt
            exit 1
          fi
      - name: Pozeni teste
        run: python -m unittest test_main.py -v
