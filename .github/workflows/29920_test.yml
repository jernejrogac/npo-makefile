name: 29920 - Testiranje

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  preveri_teste:
    name: Preveri testno datoteko
    strategy:
      matrix:
        c_standard: [c99, c11]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Preveri ce obstaja test_main.c
        run: |
          if [ ! -f test_main.c ]; then 
            echo "test_main.c ne obstaja" > napaka.txt
          else
            echo "" > napaka.txt
          fi

      - name: Nalozi napaka.txt
        uses: actions/upload-artifact@v4
        with:
          name: napaka-${{ matrix.c_standard }}
          path: napaka.txt

  pozeni_teste:
    name: Pozeni teste
    needs: preveri_teste
    strategy:
      matrix:
        c_standard: [c99, c11]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Namesti gcc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc

      - name: Prenesi napaka.txt
        uses: actions/download-artifact@v4
        with:
          name: napaka-${{ matrix.c_standard }}
          path: ./artefakti

      - name: Preveri vsebino napaka.txt
        run: |
          if [ ! -f ./artefakti/napaka.txt ]; then
            echo "napaka.txt manjka"
            exit 1
          fi

          value=$(cat ./artefakti/napaka.txt)
          echo "Vsebina napaka.txt iz joba 1: $value"

          if [ -s ./artefakti/napaka.txt ]; then
            exit 1
          fi

      - name: Prevedi teste
        run: gcc -std=${{ matrix.c_standard }} test_main.c -o test_program

      - name: Pozeni teste
        run: ./test_program
