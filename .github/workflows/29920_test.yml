name: 29920 - Testiranje
on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  preveri_teste:
    name: Preveri testno datoteko
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Preveri ce obstaja test_main.sh
        run: |
          if [ ! -f test_main.sh ]; then
            echo "test_main.sh ne obstaja" > napaka.txt
          else
            touch napaka.txt
          fi
      - name: Nalozi napaka.txt
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  pozeni_teste:
    name: Pozeni teste
    needs: preveri_teste
    strategy:
      matrix:
        gcc_version: ["11", "12"]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Namesti gcc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-${{ matrix.gcc_version }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ matrix.gcc_version }} 100
      - name: Prenesi napaka.txt
        uses: actions/download-artifact@v4
        with:
          name: napaka
          path: ./artefakti
      - name: Preveri napaka.txt
        run: |
          if [ ! -f ./artefakti/napaka.txt ]; then
            echo "napaka.txt manjka"
            exit 1
          fi
          if [ -s ./artefakti/napaka.txt ]; then
            cat ./artefakti/napaka.txt
            exit 1
          fi
      - name: Pozeni teste
        run: make test
